version: '3.8'

services:
  # Bridge Service with Viewer - Testing GitHub image
  bridge:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-bridge-viewer:latest
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - VIEWER_ENABLED=true
      - VIEWER_PATH=/app/bridge/viewer/dist/xregistry-viewer
      - VIEWER_PROXY_ENABLED=true
      - API_PATH_PREFIX=/registry
      - DOWNSTREAMS_JSON={"servers":[{"url":"http://npm:3100","apikey":"npm-api-key"},{"url":"http://pypi:3000","apikey":"pypi-api-key"},{"url":"http://maven:3300","apikey":"maven-api-key"},{"url":"http://nuget:3200","apikey":"nuget-api-key"},{"url":"http://oci:3400","apikey":"oci-api-key"},{"url":"http://mcp:3600","apikey":"mcp-api-key"},{"url":"http://crates:3700","apikey":"crates-api-key"},{"url":"http://huggingface:4300"},{"url":"http://gomod:3900","apikey":"gomod-api-key"},{"url":"http://rubygems:4000","apikey":"rubygems-api-key"},{"url":"http://packagist:4100","apikey":"packagist-api-key"}]}
    restart: unless-stopped
    depends_on:
      - npm
      - pypi
      - maven
      - nuget
      - oci
      - mcp
      - crates
      - huggingface
      - gomod
      - rubygems
      - packagist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Maven Service
  maven:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-maven-bridge:latest
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # NPM Service
  npm:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-npm-bridge:latest
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PyPI Service
  pypi:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-pypi-bridge:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # NuGet Service
  nuget:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-nuget-bridge:latest
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=production
      - PORT=3200
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # OCI Service
  oci:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-oci-bridge:latest
    ports:
      - "3400:3400"
    environment:
      - NODE_ENV=production
      - PORT=3400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3400/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MCP Service
  mcp:
    image: ghcr.io/clemensv/xregistry-package-registries/xregistry-mcp-bridge:latest
    ports:
      - "3600:3600"
    environment:
      - NODE_ENV=production
      - PORT=3600
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3600/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Crates.io Service
  crates:
    image: ghcr.io/xregistry/xrproxy/xregistry-crates-bridge:latest
    ports:
      - "3700:3700"
    environment:
      - NODE_ENV=production
      - PORT=3700
      - HOST=0.0.0.0
      - UPSTREAM_URL=https://crates.io
      - CACHE_DIR=/app/crates/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Hugging Face Hub Service (anonymous-only: no apikey in bridge downstream)
  huggingface:
    image: ghcr.io/xregistry/xrproxy/xregistry-huggingface-bridge:latest
    ports:
      - "4300:4300"
    environment:
      - NODE_ENV=production
      - PORT=4300
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Go Module Proxy Service
  gomod:
    image: ghcr.io/xregistry/xrproxy/xregistry-gomod-proxy:latest
    ports:
      - "3900:3900"
    environment:
      - NODE_ENV=production
      - PORT=3900
      - HOST=0.0.0.0
      - CACHE_DIR=/app/gomod/cache
    volumes:
      - ./gomod/cache:/app/gomod/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # RubyGems Service
  rubygems:
    image: ghcr.io/xregistry/xrproxy/xregistry-rubygems-bridge:latest
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Packagist Registry (Composer/PHP)
  packagist:
    image: ghcr.io/xregistry/xrproxy/xregistry-packagist-bridge:latest
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - PORT=4100
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
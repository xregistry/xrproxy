name: Build xRegistry Container Images

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "bridge/**"
      - "npm/**"
      - "pypi/**"
      - "maven/**"
      - "nuget/**"
      - "oci/**"
      - "mcp/**"
      - "crates/**"
      - "huggingface/**"
      - "gomod/**"
      - "viewer/**"
      - "shared/**"
      - "config/services.json"
      - "scripts/service-manifest.mjs"
      - "docker-compose.yml"
      - "*.Dockerfile"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  service-matrix:
    name: Discover image matrix
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: echo "images=$(node scripts/service-manifest.mjs matrix images)" >> "$GITHUB_OUTPUT"
      - run: npm run services:validate

  build-sign-verify:
    name: Build, sign, and verify ${{ matrix.image }}
    needs: service-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.images) }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: sigstore/cosign-installer@v3

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.imageName }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.sha }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref,'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref,'refs/tags/v') }}
            type=ref,event=branch

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true

      - name: Sign image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.imageName }}@${{ steps.build.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
            "${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.imageName }}@${{ steps.build.outputs.digest }}"

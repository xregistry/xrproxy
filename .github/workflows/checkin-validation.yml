name: Checkin Validation

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "bridge/**"
      - "npm/**"
      - "pypi/**"
      - "maven/**"
      - "nuget/**"
      - "oci/**"
      - "mcp/**"
      - "shared/**"
      - "config/**"
      - "charts/**"
      - "scripts/**"
      - "test/**"
      - "*.Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/checkin-validation.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "bridge/**"
      - "npm/**"
      - "pypi/**"
      - "maven/**"
      - "nuget/**"
      - "oci/**"
      - "mcp/**"
      - "shared/**"
      - "config/**"
      - "charts/**"
      - "scripts/**"
      - "test/**"
      - "*.Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/checkin-validation.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  service-matrix:
    name: Validate service manifest
    runs-on: ubuntu-latest
    outputs:
      docker-tests: ${{ steps.matrix.outputs.docker-tests }}
      images: ${{ steps.matrix.outputs.images }}
      build: ${{ steps.matrix.outputs.build }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run services:validate
      - run: npm run test:manifest
      - run: npm run test:compose-services
      - run: npm run helm:services:check
      - run: npm run test:helm-services
      - id: matrix
        run: |
          echo "docker-tests=$(node scripts/service-manifest.mjs matrix docker-tests)" >> "$GITHUB_OUTPUT"
          echo "images=$(node scripts/service-manifest.mjs matrix images)" >> "$GITHUB_OUTPUT"
          echo "build=$(node scripts/service-manifest.mjs matrix build)" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  registry-core:
    name: Registry Core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/registry-core/package-lock.json
      - run: npm run ci:registry-core

  docker-integration-tests:
    name: Docker Integration Tests (${{ matrix.service }})
    needs: [service-matrix, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.docker-tests) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: docker/setup-buildx-action@v3
      - name: Run Docker integration tests
        run: ./test/run-docker-integration-tests.sh --service ${{ matrix.service }}
        timeout-minutes: 15
      - name: Cleanup Docker resources
        if: always()
        run: |
          docker container prune -f || true
          docker image prune -f || true
          docker volume prune -f || true

  bridge-integration-tests:
    name: Bridge Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: docker/setup-buildx-action@v3
      - name: Run Bridge integration tests
        run: ./test/run-bridge-integration-tests.sh --timeout 600
        timeout-minutes: 20
      - name: Show service logs on failure
        if: failure()
        run: |
          docker ps -a || true
          docker images || true
          docker network ls || true
          docker volume ls || true
      - name: Cleanup Docker resources
        if: always()
        run: |
          docker container prune -f || true
          docker image prune -f || true
          docker volume prune -f || true
          docker network prune -f || true

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level moderate
      - run: npm outdated || true
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: "*.Dockerfile"
          recursive: true
          failure-threshold: warning
          ignore: DL3018

  dockerfile-validation:
    name: Dockerfile Clean Build (${{ matrix.image }})
    needs: service-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: xregistry-${{ matrix.image }}:test
          no-cache: true
          load: true
      - run: docker images xregistry-${{ matrix.image }}:test

  # TypeScript compilation per service, derived from the manifest build matrix.
  # Catches compile errors before the heavier Docker build phase.
  ts-build:
    name: TypeScript build (${{ matrix.service }})
    needs: service-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.build) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Build ${{ matrix.service }}
        run: npm run build:${{ matrix.service }}

  # Dedicated drift-check job so a values.yaml or workflow-path gap surfaces as
  # a clearly labelled failure distinct from manifest validation.
  manifest-drift:
    name: CI artifact drift check
    needs: service-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run ci:drift:check
      - run: npm run test:ci-drift

  checkin-validation-complete:
    name: Checkin Validation Complete
    runs-on: ubuntu-latest
    needs:
      - service-matrix
      - unit-tests
      - registry-core
      - ts-build
      - manifest-drift
      - docker-integration-tests
      - bridge-integration-tests
      - code-quality
      - dockerfile-validation
    if: always()
    steps:
      - name: Check all jobs status
        env:
          SERVICE_MATRIX: ${{ needs.service-matrix.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          REGISTRY_CORE: ${{ needs.registry-core.result }}
          TS_BUILD: ${{ needs.ts-build.result }}
          MANIFEST_DRIFT: ${{ needs.manifest-drift.result }}
          DOCKER_TESTS: ${{ needs.docker-integration-tests.result }}
          BRIDGE_TESTS: ${{ needs.bridge-integration-tests.result }}
          CODE_QUALITY: ${{ needs.code-quality.result }}
          DOCKERFILES: ${{ needs.dockerfile-validation.result }}
        run: |
          echo "Job results:"
          echo "  service-matrix:          $SERVICE_MATRIX"
          echo "  unit-tests:              $UNIT_TESTS"
          echo "  registry-core:           $REGISTRY_CORE"
          echo "  ts-build:                $TS_BUILD"
          echo "  manifest-drift:          $MANIFEST_DRIFT"
          echo "  docker-integration-tests:$DOCKER_TESTS"
          echo "  bridge-integration-tests:$BRIDGE_TESTS"
          echo "  code-quality:            $CODE_QUALITY"
          echo "  dockerfile-validation:   $DOCKERFILES"
          for result in \
            "$SERVICE_MATRIX" \
            "$UNIT_TESTS" \
            "$REGISTRY_CORE" \
            "$TS_BUILD" \
            "$MANIFEST_DRIFT" \
            "$DOCKER_TESTS" \
            "$BRIDGE_TESTS" \
            "$CODE_QUALITY" \
            "$DOCKERFILES"; do
            if [[ "$result" != "success" ]]; then
              echo "❌ One or more validation jobs did not succeed (result: $result)"
              exit 1
            fi
          done
          echo "✅ All validation checks passed"

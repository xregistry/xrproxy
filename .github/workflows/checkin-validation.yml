name: Checkin Validation

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "bridge/**"
      - "npm/**"
      - "pypi/**"
      - "maven/**"
      - "nuget/**"
      - "oci/**"
      - "mcp/**"
      - "shared/**"
      - "config/**"
      - "scripts/**"
      - "test/**"
      - "*.Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/checkin-validation.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "bridge/**"
      - "npm/**"
      - "pypi/**"
      - "maven/**"
      - "nuget/**"
      - "oci/**"
      - "mcp/**"
      - "shared/**"
      - "config/**"
      - "scripts/**"
      - "test/**"
      - "*.Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/checkin-validation.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  service-matrix:
    name: Validate service manifest
    runs-on: ubuntu-latest
    outputs:
      docker-tests: ${{ steps.matrix.outputs.docker-tests }}
      images: ${{ steps.matrix.outputs.images }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run services:validate
      - run: npm run test:manifest
      - id: matrix
        run: |
          echo "docker-tests=$(node scripts/service-manifest.mjs matrix docker-tests)" >> "$GITHUB_OUTPUT"
          echo "images=$(node scripts/service-manifest.mjs matrix images)" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  docker-integration-tests:
    name: Docker Integration Tests (${{ matrix.service }})
    needs: [service-matrix, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.docker-tests) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: docker/setup-buildx-action@v3
      - name: Run Docker integration tests
        run: ./test/run-docker-integration-tests.sh --service ${{ matrix.service }}
        timeout-minutes: 15
      - name: Cleanup Docker resources
        if: always()
        run: |
          docker container prune -f || true
          docker image prune -f || true
          docker volume prune -f || true

  bridge-integration-tests:
    name: Bridge Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: docker/setup-buildx-action@v3
      - name: Run Bridge integration tests
        run: ./test/run-bridge-integration-tests.sh --timeout 600
        timeout-minutes: 20
      - name: Show service logs on failure
        if: failure()
        run: |
          docker ps -a || true
          docker images || true
          docker network ls || true
          docker volume ls || true
      - name: Cleanup Docker resources
        if: always()
        run: |
          docker container prune -f || true
          docker image prune -f || true
          docker volume prune -f || true
          docker network prune -f || true

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level moderate
      - run: npm outdated || true
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: "*.Dockerfile"
          recursive: true
          failure-threshold: warning
          ignore: DL3018

  dockerfile-validation:
    name: Dockerfile Clean Build (${{ matrix.image }})
    needs: service-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.service-matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: xregistry-${{ matrix.image }}:test
          no-cache: true
          load: true
      - run: docker images xregistry-${{ matrix.image }}:test

  checkin-validation-complete:
    name: Checkin Validation Complete
    runs-on: ubuntu-latest
    needs:
      - service-matrix
      - unit-tests
      - docker-integration-tests
      - bridge-integration-tests
      - code-quality
      - dockerfile-validation
    if: always()
    steps:
      - name: Check all jobs status
        env:
          SERVICE_MATRIX: ${{ needs.service-matrix.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          DOCKER_TESTS: ${{ needs.docker-integration-tests.result }}
          BRIDGE_TESTS: ${{ needs.bridge-integration-tests.result }}
          CODE_QUALITY: ${{ needs.code-quality.result }}
          DOCKERFILES: ${{ needs.dockerfile-validation.result }}
        run: |
          for result in "$SERVICE_MATRIX" "$UNIT_TESTS" "$DOCKER_TESTS" "$BRIDGE_TESTS" "$CODE_QUALITY" "$DOCKERFILES"; do
            if [[ "$result" != "success" ]]; then
              echo "One or more validation jobs failed or were skipped"
              exit 1
            fi
          done

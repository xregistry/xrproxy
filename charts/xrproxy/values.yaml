nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  repositoryPrefix: xregistry/xrproxy
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

probes:
  startup:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

cache:
  enabled: true
  sizeLimit: 2Gi

pdb:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: true

gateway:
  enabled: false
  create: false
  className: ""
  annotations: {}
  listener:
    name: http
    protocol: HTTP
    port: null
    hostname: ""
    tls:
      enabled: false
      certificateSecretName: ""
  parentRef:
    name: ""
    namespace: ""
    sectionName: ""
  httpRoute:
    annotations: {}
    hostnames: []

certificate:
  enabled: false
  issuerRef:
    name: ""
    kind: ClusterIssuer
    group: cert-manager.io
  secretName: ""
  dnsNames: []

# BEGIN GENERATED SERVICES - run: npm run helm:services:generate
services:
  npm:
    enabled: true
    role: proxy
    directory: npm
    image:
      repository: xregistry-npm-bridge
      tag: ""
      digest: ""
    port: 3100
    healthPath: /health
    readinessPath: /health
    replicas: 1
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 1Gi
    cache:
      enabled: true
      mountPath: /app/npm/cache
      sizeLimit: ""
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3

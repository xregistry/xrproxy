{{- if .Values.gateway.enabled }}
{{- $bridge := index .Values.services "bridge" }}
{{- if not $bridge.enabled }}
{{- fail "services.bridge.enabled must be true when gateway.enabled=true" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "xrproxy.fullname" . }}
  labels:
    {{- include "xrproxy.labels" . | nindent 4 }}
  {{- with .Values.gateway.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ if .Values.gateway.create }}{{ include "xrproxy.fullname" . }}{{ else }}{{ required "gateway.parentRef.name is required when gateway.create=false" .Values.gateway.parentRef.name }}{{ end }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.gateway.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  {{- with .Values.gateway.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "xrproxy.serviceName" (dict "root" . "id" "bridge") }}
          port: {{ $bridge.port }}
{{- end }}

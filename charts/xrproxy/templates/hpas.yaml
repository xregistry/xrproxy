{{- range $id, $service := .Values.services }}
{{- if and $service.enabled $service.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "xrproxy.serviceName" (dict "root" $ "id" $id) }}
  labels:
    {{- include "xrproxy.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $id }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "xrproxy.serviceName" (dict "root" $ "id" $id) }}
  minReplicas: {{ $service.autoscaling.minReplicas }}
  maxReplicas: {{ $service.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $service.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}

{{- range $id, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xrproxy.serviceName" (dict "root" $ "id" $id) }}
  labels:
    {{- include "xrproxy.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $id }}
spec:
  type: ClusterIP
  selector:
    {{- include "xrproxy.selectorLabels" (dict "root" $ "id" $id) | nindent 4 }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}

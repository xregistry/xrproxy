{{- if .Values.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "xrproxy.fullname" . }}
  labels:
    {{- include "xrproxy.labels" . | nindent 4 }}
spec:
  secretName: {{ required "certificate.secretName is required when certificate.enabled=true" .Values.certificate.secretName }}
  issuerRef:
    name: {{ required "certificate.issuerRef.name is required when certificate.enabled=true" .Values.certificate.issuerRef.name }}
    kind: {{ .Values.certificate.issuerRef.kind }}
    group: {{ .Values.certificate.issuerRef.group }}
  dnsNames:
    {{- required "certificate.dnsNames must contain at least one DNS name" .Values.certificate.dnsNames | toYaml | nindent 4 }}
{{- end }}

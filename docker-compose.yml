services:
  # Bridge Service - Main API Gateway
  bridge:
    build:
      context: .
      dockerfile: bridge.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - BRIDGE_PORT=8080
      - DOWNSTREAMS_JSON={"servers":[{"url":"http://npm:3100","apikey":"npm-api-key"},{"url":"http://pypi:3000","apikey":"pypi-api-key"},{"url":"http://maven:3300","apikey":"maven-api-key"},{"url":"http://nuget:3200","apikey":"nuget-api-key"},{"url":"http://oci:3400","apikey":"oci-api-key"},{"url":"http://mcp:3600","apikey":"mcp-api-key"},{"url":"http://crates:3700","apikey":"crates-api-key"},{"url":"http://huggingface:4300"},{"url":"http://gomod:3900","apikey":"gomod-api-key"},{"url":"http://terraform:3800","apikey":"terraform-api-key"},{"url":"http://rubygems:4000","apikey":"rubygems-api-key"},{"url":"http://packagist:4100","apikey":"packagist-api-key"}]}
    volumes:
      - ./logs/bridge:/app/logs
      - ./cache:/app/cache
    restart: unless-stopped
    depends_on:
      - npm
      - pypi
      - maven
      - nuget
      - oci
      - mcp
      - crates
      - huggingface
      - gomod
      - terraform
      - rubygems
      - packagist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Maven Service
  maven:
    build:
      context: .
      dockerfile: maven.Dockerfile
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
    volumes:
      - ./logs/maven:/app/logs
      - ./maven/cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # NPM Service
  npm:
    build:
      context: .
      dockerfile: npm.Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOST=0.0.0.0
    volumes:
      - ./logs/npm:/app/logs
      - ./npm/cache:/app/cache
      - ./npm/all-packages:/app/all-packages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PyPI Service
  pypi:
    build:
      context: .
      dockerfile: pypi.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./logs/pypi:/app/logs
      - ./pypi/cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # NuGet Service
  nuget:
    build:
      context: .
      dockerfile: nuget.Dockerfile
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=production
      - PORT=3200
    volumes:
      - ./logs/nuget:/app/logs
      - ./nuget/cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # OCI Service
  oci:
    build:
      context: .
      dockerfile: oci.Dockerfile
    ports:
      - "3400:3400"
    environment:
      - NODE_ENV=production
      - PORT=3400
    volumes:
      - ./logs/oci:/app/logs
      - ./oci/cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3400/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MCP Service
  mcp:
    build:
      context: .
      dockerfile: mcp.Dockerfile
    ports:
      - "3600:3600"
    environment:
      - NODE_ENV=production
      - PORT=3600
    volumes:
      - ./logs/mcp:/app/logs
      - ./mcp/cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3600/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Crates.io Service
  crates:
    build:
      context: .
      dockerfile: crates.Dockerfile
    ports:
      - "3700:3700"
    environment:
      - NODE_ENV=production
      - PORT=3700
      - HOST=0.0.0.0
      - UPSTREAM_URL=https://crates.io
      - CACHE_DIR=/app/crates/cache
    volumes:
      - ./logs/crates:/app/logs
      - ./crates/cache:/app/crates/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Hugging Face Hub Service (anonymous-only: no apikey in bridge downstream)
  huggingface:
    build:
      context: .
      dockerfile: huggingface.Dockerfile
    ports:
      - "4300:4300"
    environment:
      - NODE_ENV=production
      - PORT=4300
      - HOST=0.0.0.0
    volumes:
      - ./logs/huggingface:/app/logs
      - ./huggingface/cache:/app/huggingface/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4300/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Go Module Proxy Service
  gomod:
    build:
      context: .
      dockerfile: gomod.Dockerfile
    ports:
      - "3900:3900"
    environment:
      - NODE_ENV=production
      - PORT=3900
      - HOST=0.0.0.0
    volumes:
      - ./logs/gomod:/app/logs
      - ./gomod/cache:/app/gomod/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # RubyGems Service
  rubygems:
    build:
      context: .
      dockerfile: rubygems.Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOST=0.0.0.0
    volumes:
      - ./logs/rubygems:/app/logs
      - ./rubygems/cache:/app/rubygems/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Packagist Service
  packagist:
    build:
      context: .
      dockerfile: packagist.Dockerfile
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - PORT=4100
      - HOST=0.0.0.0
    volumes:
      - ./logs/packagist:/app/logs
      - ./packagist/cache:/app/packagist/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Terraform Registry Service
  terraform:
    build:
      context: .
      dockerfile: terraform.Dockerfile
    ports:
      - "3800:3800"
    environment:
      - NODE_ENV=production
      - PORT=3800
      - HOST=0.0.0.0
    volumes:
      - ./logs/terraform:/app/logs
      - ./terraform/cache:/app/terraform/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Bridge with Viewer - Optional service with integrated viewer UI
  # Uncomment to run bridge with viewer instead of standard bridge
  # bridge-viewer:
  #   build:
  #     context: .
  #     dockerfile: bridge/Dockerfile.viewer
  #   ports:
  #     - "8092:8092"
  #   environment:
  #     - NODE_ENV=production
  #     - PORT=8092
  #     - VIEWER_ENABLED=true
  #     - VIEWER_PROXY_ENABLED=true
  #     - API_PATH_PREFIX=/registry
  #     - DOWNSTREAMS_JSON={"servers":[{"url":"http://npm:3100","apikey":"npm-api-key"},{"url":"http://pypi:3000","apikey":"pypi-api-key"},{"url":"http://maven:3300","apikey":"maven-api-key"},{"url":"http://nuget:3200","apikey":"nuget-api-key"},{"url":"http://oci:3400","apikey":"oci-api-key"},{"url":"http://mcp:3600","apikey":"mcp-api-key"},{"url":"http://terraform:3800","apikey":"terraform-api-key"},{"url":"http://rubygems:4000","apikey":"rubygems-api-key"},{"url":"http://packagist:4100","apikey":"packagist-api-key"}]}
  #   volumes:
  #     - ./logs/bridge:/app/logs
  #     - ./cache:/app/cache
  #   restart: unless-stopped
  #   depends_on:
  #     - npm
  #     - pypi
  #     - maven
  #     - nuget
  #     - oci
  #     - mcp
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s

volumes:
  logs:
  cache: